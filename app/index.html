<!DOCTYPE html>
<html>
<head>
    <title>Mk Masker Pro</title>
    <style>
        body { margin: 0; font-family: -apple-system, sans-serif; background: #121212; color: white; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 320px; background: #1e1e1e; border-right: 1px solid #333; padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        #main-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; position: relative; }
        #drop-zone { border: 2px dashed #444; padding: 60px; border-radius: 15px; color: #888; text-align: center; transition: 0.3s; }
        #drop-zone.active { border-color: #3498db; background: rgba(52, 152, 219, 0.1); }
        #canvas-wrap { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; }
        canvas { max-width: 95%; max-height: 80%; cursor: crosshair; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .status-bar { font-size: 12px; display: flex; align-items: center; gap: 8px; color: #aaa; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #e74c3c; }
        .dot.online { background: #2ecc71; box-shadow: 0 0 10px #2ecc71; }
        button { background: #2ecc71; color: black; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }
        input[type=range] { width: 90%; margin-top: 20px; accent-color: #2ecc71; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h1 style="margin: 0; color: #2ecc71;">Mk Pro</h1>
        <div class="status-bar"><div id="status-dot" class="dot"></div> <span id="status-text">Connecting to Engine...</span></div>
        <hr style="border: 0; border-top: 1px solid #333; width: 100%;">
        
        <div style="font-size: 14px;">
            <label style="display: block; margin-bottom: 8px; color: #888;">EXPORT MODE</label>
            <select id="mode" style="width: 100%; background: #333; color: white; border: 1px solid #444; padding: 8px; border-radius: 4px;">
                <option value="prores">ProRes 4444 (Full Quality)</option>
                <option value="balanced">H.265 (Balanced Alpha)</option>
                <option value="bw">B&W Mask (Fusion Mode)</option>
            </select>
        </div>

        <div id="file-info" style="font-size: 12px; color: #666;">No video loaded.</div>
        
        <button id="process-btn" disabled>START RADIATING PROCESS</button>
        
        <div id="progress-area" style="display:none;">
            <div id="progress-label" style="font-size: 12px; margin-bottom: 5px;">Processing...</div>
            <div style="width: 100%; background: #333; height: 6px; border-radius: 3px; overflow: hidden;">
                <div id="progress-bar" style="width: 0%; background: #2ecc71; height: 100%; transition: 0.3s;"></div>
            </div>
        </div>
    </div>

    <div id="main-view">
        <div id="drop-zone">Drag and Drop Video Clip Here</div>
        <div id="canvas-wrap">
            <canvas id="v-canvas"></canvas>
            <input type="range" id="scrub" min="0" value="0">
            <div id="frame-num" style="margin-top: 10px; color: #888; font-size: 12px;">Frame: 0</div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
